<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lain-header-file-document-generator</title>
<style>
body { font-family: 'Segoe UI', sans-serif; margin: 40px; background: #f8f9fa; color: #333; }
.file-section { background: #2b3e50; color: white; padding: 15px; margin-top: 40px; border-radius: 6px; }
.card { background: white; padding: 20px; margin-top: 15px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #007acc; }
.badge { display: inline-block; padding: 4px 8px; font-size: 0.8em; font-weight: bold; border-radius: 4px; color: white; margin-right: 10px; }
.bg-func { background: #007acc; } .bg-macro { background: #e83e8c; } .bg-var { background: #28a745; } .bg-file { background: #6f42c1; } .bg-type { background: #fd7e14; }
code { font-family: monospace; font-size: 1.1em; background: #f1f1f1; padding: 2px 6px; border-radius: 4px; }
.param-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
.param-table td { padding: 8px; border: 1px solid #ddd; }
.param-table tr:nth-child(even){ background-color: #f9f9f9; }
.warning-box { background: #fff3cd; border-left: 5px solid #ffc107; color: #856404; padding: 12px; margin-top: 10px; border-radius: 4px; }
.see-box { font-size: 0.9em; color: #555; margin-top: 10px; background: #e2e3e5; padding: 8px; border-radius: 4px; }
</style>
<script>
  let currentVersion = null;
  setInterval(() => {
    fetch('/version').then(res => res.text()).then(version => {
        if (currentVersion === null) currentVersion = version;
        else if (currentVersion !== version) window.location.reload();
    });
  }, 1000);
</script>
</head>
<body>
<h1>Lain-header-file-document-generator</h1><hr>
<p>Tarama bolgesinde en ust satirinda '// lain-was-here' imzasi barindiran gecerli bir .h dosyasi bulunamadi.</p></body>
</html>
